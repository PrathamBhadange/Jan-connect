<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JanConnect - Admin Registration</title>
    <meta name="description" content="Register as a government official or admin on JanConnect portal.">
    <link rel="stylesheet" href="register-style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>

    <!-- Top Navigation Bar -->
    <nav class="top-nav admin-nav">
        <div class="nav-brand">
            <img src="logo.png" alt="JanConnect Logo" class="nav-logo">
            <span class="nav-title">JanConnect</span>
            <span class="nav-badge">Admin Portal</span>
        </div>
        <div class="nav-links">
            <a href="login.html" class="nav-link">Login</a>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="register-main">
        <div class="form-container admin-form">

            <!-- Admin Badge Banner -->
            <div class="admin-banner">
                <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
                </svg>
                <span>Government Official / Admin Registration</span>
            </div>

            <h1 class="form-heading">Admin Registration</h1>

            <form id="adminRegisterForm" novalidate>

                <!-- Section: Personal Information -->
                <h2 class="section-heading">Personal Information</h2>

                <!-- Row 1: Name -->
                <div class="form-row three-col">
                    <div class="form-group">
                        <label for="firstName">First Name <span class="required">*</span></label>
                        <input type="text" id="firstName" name="firstName" required>
                    </div>
                    <div class="form-group">
                        <label for="middleName">Middle Name</label>
                        <input type="text" id="middleName" name="middleName">
                    </div>
                    <div class="form-group">
                        <label for="lastName">Last Name <span class="required">*</span></label>
                        <input type="text" id="lastName" name="lastName" required>
                    </div>
                </div>

                <!-- Row 2: Email, Password, Confirm Password -->
                <div class="form-row three-col">
                    <div class="form-group">
                        <label for="email">Official Email Address <span class="required">*</span></label>
                        <input type="email" id="email" name="email" placeholder="e.g. name@gov.in" required>
                    </div>
                    <div class="form-group">
                        <label for="password">Password <span class="required">*</span></label>
                        <div class="password-field">
                            <input type="password" id="password" name="password" required>
                            <span class="toggle-password" onclick="togglePassword('password')">👁️</span>
                        </div>
                    </div>
                    <div class="form-group">
                        <label for="confirmPassword">Retype Password <span class="required">*</span></label>
                        <div class="password-field">
                            <input type="password" id="confirmPassword" name="confirmPassword" required>
                            <span class="toggle-password" onclick="togglePassword('confirmPassword')">👁️</span>
                        </div>
                    </div>
                </div>

                <!-- Row 3: Phone -->
                <div class="form-row two-col">
                    <div class="form-group">
                        <label for="phone">Phone Number</label>
                        <input type="tel" id="phone" name="phone">
                    </div>
                    <div class="form-group">
                        <label for="mobile">Mobile Number <span class="required">*</span></label>
                        <input type="tel" id="mobile" name="mobile" required>
                    </div>
                </div>

                <!-- Section: Department Details -->
                <h2 class="section-heading">Department Details</h2>

                <!-- Row 4: Employee ID, Department -->
                <div class="form-row three-col">
                    <div class="form-group">
                        <label for="employeeId">Employee ID <span class="required">*</span></label>
                        <input type="text" id="employeeId" name="employeeId" placeholder="e.g. EMP-12345" required>
                    </div>
                    <div class="form-group">
                        <label for="department">Department Name <span class="required">*</span></label>
                        <select id="department" name="department" required>
                            <option value="">-- Select Department --</option>
                            <option value="Public Works">Public Works Department</option>
                            <option value="Water Supply">Water Supply & Sanitation</option>
                            <option value="Electricity">Electricity Department</option>
                            <option value="Health">Health & Medical Services</option>
                            <option value="Education">Education Department</option>
                            <option value="Transport">Transport Department</option>
                            <option value="Revenue">Revenue Department</option>
                            <option value="Urban Development">Urban Development</option>
                            <option value="Environment">Environment & Forest</option>
                            <option value="Police">Police & Law Enforcement</option>
                            <option value="Municipal">Municipal Corporation</option>
                            <option value="IT">IT & Digital Services</option>
                            <option value="Other">Other</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="designation">Designation <span class="required">*</span></label>
                        <input type="text" id="designation" name="designation" placeholder="e.g. Ward Officer, Inspector" required>
                    </div>
                </div>

                <!-- Row 5: Office Location, Jurisdiction -->
                <div class="form-row three-col">
                    <div class="form-group">
                        <label for="officeLocation">Office Location <span class="required">*</span></label>
                        <input type="text" id="officeLocation" name="officeLocation" placeholder="City / District" required>
                    </div>
                    <div class="form-group">
                        <label for="jurisdiction">Jurisdiction / Ward</label>
                        <input type="text" id="jurisdiction" name="jurisdiction" placeholder="e.g. Ward 5, Zone A">
                    </div>
                    <div class="form-group">
                        <label for="officeAddress">Office Address</label>
                        <textarea id="officeAddress" name="officeAddress" rows="3" placeholder="Full office address"></textarea>
                    </div>
                </div>

                <!-- Submit -->
                <div class="form-actions">
                    <button type="submit" id="submitBtn">Register as Admin</button>
                </div>

                <p id="message"></p>

                <div class="form-footer">
                    <p class="login-redirect">Already have an account? <a href="login.html">Login here</a></p>
                    <p class="admin-redirect">Are you a citizen? <a href="register.html">Register as Citizen →</a></p>
                </div>
            </form>
        </div>
    </main>

    <script src="admin-register.js"></script>
</body>
</html>
