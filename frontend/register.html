<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JanConnect - Create Account</title>
    <meta name="description" content="Create your JanConnect citizen account to access smart civic solutions and government services.">
    <link rel="stylesheet" href="register-style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>

    <!-- Top Navigation Bar -->
    <nav class="top-nav">
        <div class="nav-brand">
            <img src="logo.png" alt="JanConnect Logo" class="nav-logo">
            <span class="nav-title">JanConnect</span>
        </div>
        <div class="nav-links">
            <a href="login.html" class="nav-link">Login</a>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="register-main">
        <div class="form-container">
            <h1 class="form-heading">Create Account</h1>

            <form id="registerForm" novalidate>
                <!-- Row 1: Names -->
                <div class="form-row three-col">
                    <div class="form-group">
                        <label for="firstName">First Name <span class="required">*</span></label>
                        <input type="text" id="firstName" name="firstName" required>
                    </div>
                    <div class="form-group">
                        <label for="middleName">Middle Name</label>
                        <input type="text" id="middleName" name="middleName">
                    </div>
                    <div class="form-group">
                        <label for="lastName">Last Name <span class="required">*</span></label>
                        <input type="text" id="lastName" name="lastName" required>
                    </div>
                </div>

                <!-- Row 2: Email, Password, Retype Password -->
                <div class="form-row three-col">
                    <div class="form-group">
                        <label for="email">Email Address <span class="required">*</span></label>
                        <input type="email" id="email" name="email" required>
                    </div>
                    <div class="form-group">
                        <label for="password">Password <span class="required">*</span></label>
                        <div class="password-field">
                            <input type="password" id="password" name="password" required>
                            <span class="toggle-password" onclick="togglePassword('password')">👁️</span>
                        </div>
                    </div>
                    <div class="form-group">
                        <label for="confirmPassword">Retype Password <span class="required">*</span></label>
                        <div class="password-field">
                            <input type="password" id="confirmPassword" name="confirmPassword" required>
                            <span class="toggle-password" onclick="togglePassword('confirmPassword')">👁️</span>
                        </div>
                    </div>
                </div>

                <!-- Row 3: Phone, Mobile -->
                <div class="form-row two-col">
                    <div class="form-group">
                        <label for="phone">Phone Number</label>
                        <input type="tel" id="phone" name="phone">
                    </div>
                    <div class="form-group">
                        <label for="mobile">Mobile Number <span class="required">*</span></label>
                        <input type="tel" id="mobile" name="mobile" required>
                    </div>
                </div>

                <!-- Row 4: Aadhar Number -->
                <div class="form-row two-col">
                    <div class="form-group">
                        <label for="aadhar">Aadhar Number <span class="required">*</span></label>
                        <input type="text" id="aadhar" name="aadhar" pattern="\d{12}" maxlength="12" placeholder="12-digit Aadhar Number" required>
                    </div>
                    <div class="form-group">
                        <label for="location">City / Location <span class="required">*</span></label>
                        <input type="text" id="location" name="location" required>
                    </div>
                </div>

                <!-- Section Divider: Additional Details -->
                <h2 class="section-heading">Additional Details</h2>

                <!-- Row 5: Consumer No, License No, PAN No -->
                <div class="form-row three-col">
                    <div class="form-group">
                        <label for="consumerNo">Consumer No</label>
                        <input type="text" id="consumerNo" name="consumerNo">
                    </div>
                    <div class="form-group">
                        <label for="licenseNo">License No</label>
                        <input type="text" id="licenseNo" name="licenseNo">
                    </div>
                    <div class="form-group">
                        <label for="panNo">PAN No</label>
                        <input type="text" id="panNo" name="panNo" maxlength="10">
                    </div>
                </div>

                <!-- Row 6: Property No, Address, Pincode -->
                <div class="form-row three-col">
                    <div class="form-group">
                        <label for="propertyNo">Property No</label>
                        <input type="text" id="propertyNo" name="propertyNo">
                    </div>
                    <div class="form-group">
                        <label for="address">Address</label>
                        <textarea id="address" name="address" rows="4"></textarea>
                    </div>
                    <div class="form-group">
                        <label for="pincode">Pincode</label>
                        <input type="text" id="pincode" name="pincode" maxlength="6" pattern="\d{6}">
                    </div>
                </div>

                <!-- Submit -->
                <div class="form-actions">
                    <button type="submit" id="submitBtn">Create Account</button>
                </div>

                <p id="message"></p>

                <div class="form-footer">
                    <p class="login-redirect">Already have an account? <a href="login.html">Login here</a></p>
                    <p class="admin-redirect">Are you a government official? <a href="admin-register.html">Register as Admin →</a></p>
                </div>
            </form>
        </div>
    </main>

    <script src="register.js"></script>
</body>
</html>
